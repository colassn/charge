<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米 212W 實時監測系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans HK"', 'sans-serif'] },
                    colors: {
                        mi: '#ff6900',
                        miDark: '#e55e00',
                        dark: '#121212',
                        darkCard: '#1e1e1e'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f1115; color: #e5e7eb; }
        .glass-panel {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        
        .active-rental-card { border: 1px solid rgba(255, 105, 0, 0.3); }
        
        /* Battery progress bar animation */
        .bat-progress {
            transition: width 1s linear, background-color 0.5s ease;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="glass-panel sticky top-0 z-40 shadow-lg">
        <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-mi to-orange-400 flex items-center justify-center text-white shadow-lg shadow-orange-500/30 relative">
                    <i class="fa-solid fa-bolt text-xl"></i>
                    <div id="sync-indicator" class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border border-dark"></div>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">Xiaomi 212W 實時監測</h1>
                    <p class="text-xs text-gray-400 flex items-center gap-1">
                        <i class="fa-solid fa-cloud text-[10px]"></i> 已連接 Firebase 雲端同步
                    </p>
                </div>
            </div>
            <button onclick="addChargeRecord()" class="bg-gray-800 hover:bg-gray-700 text-green-400 border border-green-500/30 px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-lg shrink-0">
                <i class="fa-solid fa-plug mr-2"></i>記錄充滿電
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto w-full px-4 py-6 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="glass-panel p-5 rounded-2xl flex flex-col justify-center border-l-4" id="battery-status-card">
                <p class="text-xs text-gray-400 mb-1">充電寶當前真實電量</p>
                <div class="flex items-end gap-2">
                    <span id="current-battery-text" class="text-4xl font-black text-white">--%</span>
                    <button onclick="openEditBatteryModal()" class="mb-1.5 text-gray-500 hover:text-white transition-colors" title="手動校準電量">
                        <i class="fa-solid fa-pen-to-square text-sm"></i>
                    </button>
                </div>
            </div>
            
            <div class="glass-panel p-5 rounded-2xl flex flex-col justify-center bg-gradient-to-br from-gray-900 to-gray-800 relative overflow-hidden border border-gray-700 md:col-span-2">
                <div class="absolute -right-4 -bottom-4 opacity-10">
                    <i class="fa-solid fa-radar text-7xl text-mi"></i>
                </div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                    <p class="text-xs text-gray-400 font-bold tracking-wider">實時耗電監測引擎啟動中</p>
                </div>
                <p class="text-sm font-medium text-gray-300 leading-relaxed">
                    系統會根據你借出的 <strong class="text-white">裝置類型</strong>，自動推算耗電速度。<br>
                    借出期間，進度條會 <strong class="text-mi">實時倒數</strong> 顯示預估剩餘電量！
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-5 space-y-6">
                
                <div class="glass-panel rounded-2xl p-5 border-t-4 border-t-mi shadow-lg shadow-mi/5">
                    <h2 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-hand-holding-hand text-mi mr-2"></i>登記借出</h2>
                    <form id="lendForm" class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">借用人</label>
                            <input type="text" id="lendUser" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:ring-1 focus:ring-mi focus:outline-none" placeholder="例如: 阿明 / 自己" required autocomplete="off">
                            <div id="recentUsersContainer" class="mt-2 flex gap-2 overflow-x-auto no-scrollbar pb-1 hidden"></div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">線材類型</label>
                                <button type="button" onclick="openCableSelect()" id="btnLendCable" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-left text-sm flex justify-between items-center focus:outline-none focus:border-mi transition-colors">
                                    <span>C to C (快充)</span>
                                    <i class="fa-solid fa-chevron-down text-gray-500 text-xs"></i>
                                </button>
                                <input type="hidden" id="lendCable" value="C to C (快充)" required>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">充電裝置 (決定耗電速度)</label>
                                <button type="button" onclick="openDeviceSelect()" id="btnLendDevice" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-left text-sm flex justify-between items-center focus:outline-none focus:border-mi transition-colors border-l-2 border-l-mi">
                                    <span class="font-bold">手機 (iPhone)</span>
                                    <i class="fa-solid fa-chevron-down text-gray-500 text-xs"></i>
                                </button>
                                <input type="hidden" id="lendDevice" value="手機 (iPhone)" required>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">借出時電量 (%)</label>
                                <input type="number" id="lendPct" min="0" max="100" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-mi" required>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">借出時間</label>
                                <input type="time" id="lendTime" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-mi" required>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded-lg transition-all shadow-lg mt-2">
                            確認借出
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-6">
                
                <div>
                    <h2 class="text-lg font-bold text-white mb-3 flex items-center">
                        <i class="fa-solid fa-satellite-dish text-mi mr-2 animate-pulse"></i>實時借出中
                    </h2>
                    <div id="activeRentalsContainer" class="space-y-3">
                        <div class="text-center py-6 text-gray-500 bg-gray-800/30 rounded-xl border border-dashed border-gray-700 text-sm">
                            <i class="fa-solid fa-circle-notch fa-spin mr-2"></i>載入中...
                        </div>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg font-bold text-gray-400"><i class="fa-solid fa-clock-rotate-left mr-2"></i>歷史紀錄</h2>
                    </div>
                    <div id="historyContainer" class="space-y-3 max-h-[40vh] overflow-y-auto pr-2 pb-10">
                         </div>
                </div>

            </div>
        </div>
    </main>

    <div id="returnModal" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4 bg-black/80 backdrop-blur-sm transition-all duration-300">
        <div class="bg-darkCard border border-mi rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold text-center text-white mb-1">歸還結算</h3>
            <p id="return-modal-user" class="text-center text-mi text-sm font-bold mb-4">正在歸還: --</p>
            
            <form id="returnForm" class="space-y-4">
                <input type="hidden" id="returnId">
                <input type="hidden" id="returnStartPct">
                <input type="hidden" id="returnStartTime">

                <div class="bg-gray-900 rounded-xl p-4 text-center border border-gray-800">
                    <span class="text-gray-400 text-xs">系統預估剩餘</span><br>
                    <span id="return-modal-est" class="text-3xl font-black text-white">--%</span>
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-1">請輸入真實剩餘電量 (%)</label>
                    <input type="number" id="returnPct" min="0" max="100" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-mi text-2xl font-bold text-center" placeholder="例如: 50" required>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeReturnModal()" class="flex-1 py-3 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold">取消</button>
                    <button type="submit" class="flex-1 py-3 rounded-lg bg-mi hover:bg-miDark text-white font-bold shadow-lg shadow-mi/30">確認歸還</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 z-[70] hidden flex items-center justify-center px-4 bg-black/70 backdrop-blur-sm transition-all duration-300">
        <div class="bg-darkCard border border-gray-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 id="confirm-title" class="text-lg font-bold text-center text-white mb-2">提示</h3>
            <p id="confirm-msg" class="text-center text-gray-400 text-sm mb-6"></p>
            <div class="flex gap-3">
                <button id="confirm-btn-cancel" onclick="closeConfirmModal()" class="flex-1 py-2 rounded-lg bg-gray-800 text-gray-300">取消</button>
                <button id="confirm-btn-ok" class="flex-1 py-2 rounded-lg bg-mi text-white font-bold">確定</button>
            </div>
        </div>
    </div>

    <div id="editBatteryModal" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4 bg-black/80 backdrop-blur-sm transition-all duration-300">
        <div class="bg-darkCard border border-gray-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold text-center text-white mb-2">手動校準真實電量</h3>
            <form id="editBatteryForm" class="space-y-4 mt-4">
                <div>
                    <input type="number" id="newBatteryPct" min="0" max="100" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-4 text-white focus:outline-none focus:border-mi text-3xl font-bold text-center" required>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeEditBatteryModal()" class="flex-1 py-3 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold">取消</button>
                    <button type="submit" class="flex-1 py-3 rounded-lg bg-mi hover:bg-miDark text-white font-bold shadow-lg shadow-mi/30">確認更新</button>
                </div>
            </form>
        </div>
    </div>

    <div id="selectModal" class="fixed inset-0 z-[60] hidden flex items-end sm:items-center justify-center sm:px-4 sm:pb-4 bg-black/70 backdrop-blur-sm transition-opacity opacity-0 duration-300">
        <div class="bg-darkCard border border-gray-700 rounded-t-2xl sm:rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden transform transition-transform translate-y-full sm:translate-y-0 duration-300" id="selectModalContent">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900/50">
                <h3 id="select-title" class="text-lg font-bold text-white">請選擇</h3>
                <button type="button" onclick="closeSelectModal()" class="text-gray-400 hover:text-white w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="select-options" class="max-h-[50vh] overflow-y-auto p-2">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const userConfig = {
            apiKey: "AIzaSyBrR4LBM2GA9vWQVR2KeQu4YFgHJXSYsNE",
            authDomain: "charge-d37c0.firebaseapp.com",
            projectId: "charge-d37c0",
            storageBucket: "charge-d37c0.firebasestorage.app",
            messagingSenderId: "1094688653484",
            appId: "1:1094688653484:web:b16fccdc2ef3b748675f09",
            measurementId: "G-M4M2WD66RJ"
        };
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-powerbank-app';

        // State Memory
        let activeRentals = [];
        let rentalHistory = [];
        let recentUsers = []; 
        let currentBattery = 100;
        let currentUser = null;
        let liveTrackerInterval = null;

        const colActive = collection(db, 'artifacts', appId, 'public', 'data', 'activeRentals');
        const colHistory = collection(db, 'artifacts', appId, 'public', 'data', 'rentalHistory');
        const docBattery = doc(db, 'artifacts', appId, 'public', 'data', 'system', 'batteryState');
        const docUsers = doc(db, 'artifacts', appId, 'public', 'data', 'system', 'recentUsers');

        // --- Drain Rate Engine (% per minute) ---
        // Based on 25000mAh. 1% = 250mAh.
        const DRAIN_RATES = {
            '手提電腦': 0.15, // High power (e.g., 40W+) -> ~0.15% per min
            '平板 (iPad)': 0.08, 
            '平板 (Android)': 0.08,
            '手機 (iPhone)': 0.05, 
            '手機 (Android)': 0.06,
            '手錶/耳機': 0.01,
            '多部裝置': 0.12
        };

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
            }
        }

        initAuth();

        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (!user) return;

            onSnapshot(colActive, (snap) => {
                activeRentals = snap.docs.map(d => ({id: d.id, ...d.data()}));
                activeRentals.sort((a, b) => b.timestamp - a.timestamp);
                renderActiveRentals();
                startLiveTracking();
                flashSyncIndicator();
            }, err => console.error(err));

            onSnapshot(colHistory, (snap) => {
                rentalHistory = snap.docs.map(d => ({id: d.id, ...d.data()}));
                rentalHistory.sort((a, b) => b.timestamp - a.timestamp);
                renderHistory();
                flashSyncIndicator();
            }, err => console.error(err));

            onSnapshot(docBattery, (docSnap) => {
                if (docSnap.exists()) currentBattery = docSnap.data().value;
                else currentBattery = 100;
                updateDashboard();
                flashSyncIndicator();
            }, err => console.error(err));

            onSnapshot(docUsers, (docSnap) => {
                if (docSnap.exists()) {
                    recentUsers = docSnap.data().names || [];
                    renderRecentUsers();
                }
            }, err => console.error(err));
            
            setDefaultTime();
        });

        function flashSyncIndicator() {
            const ind = document.getElementById('sync-indicator');
            ind.classList.remove('bg-green-500');
            ind.classList.add('bg-white', 'shadow-[0_0_8px_#fff]');
            setTimeout(() => {
                ind.classList.add('bg-green-500');
                ind.classList.remove('bg-white', 'shadow-[0_0_8px_#fff]');
            }, 500);
        }

        function setDefaultTime() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('lendTime').value = timeString;
            setTimeout(() => { document.getElementById('lendPct').value = currentBattery; }, 500);
        }

        // --- Core UI Updates ---

        function updateDashboard() {
            const batText = document.getElementById('current-battery-text');
            const statusCard = document.getElementById('battery-status-card');
            
            batText.innerText = currentBattery + '%';
            document.getElementById('lendPct').value = currentBattery;
            
            statusCard.className = "glass-panel p-5 rounded-2xl flex flex-col justify-center border-l-4 transition-colors duration-500"; 
            if (currentBattery < 20) {
                statusCard.classList.add('border-l-red-500');
                batText.className = "text-4xl font-black text-red-500";
            } else if (currentBattery <= 50) {
                statusCard.classList.add('border-l-orange-500');
                batText.className = "text-4xl font-black text-orange-400";
            } else {
                statusCard.classList.add('border-l-green-500');
                batText.className = "text-4xl font-black text-green-400";
            }
        }

        function renderRecentUsers() {
            const container = document.getElementById('recentUsersContainer');
            if (recentUsers.length > 0) {
                container.classList.remove('hidden');
                container.innerHTML = recentUsers.map(name => `
                    <button type="button" onclick="window.fillUserName('${name}')" class="shrink-0 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-300 text-[10px] px-3 py-1.5 rounded-full transition-colors flex items-center gap-1">
                        <i class="fa-solid fa-history text-gray-500"></i> ${name}
                    </button>
                `).join('');
            } else {
                container.classList.add('hidden');
            }
        }

        window.fillUserName = function(name) {
            document.getElementById('lendUser').value = name;
        };

        // --- Live Tracker Engine ---
        function calculateLiveStats(rental) {
            const now = new Date();
            const startTime = new Date(rental.startTime);
            let diffMins = (now - startTime) / 60000;
            if(diffMins < 0) diffMins = 0; // Prevent future dates bugs

            const rate = DRAIN_RATES[rental.device] || 0.05;
            const consumed = diffMins * rate;
            let currentEst = rental.startPct - consumed;
            if(currentEst < 0) currentEst = 0;

            return {
                estPct: currentEst,
                consumed: consumed
            };
        }

        function renderActiveRentals() {
            const container = document.getElementById('activeRentalsContainer');

            if(activeRentals.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-gray-500 bg-gray-800/30 rounded-xl border border-dashed border-gray-700 text-sm">目前冇人借緊充電寶</div>`;
                return;
            }

            container.innerHTML = activeRentals.map(r => {
                const timeOnly = formatTimeOnly(r.startTime);
                let devIcon = 'fa-mobile-screen';
                if(r.device.includes('平板')) devIcon = 'fa-tablet-screen-button';
                if(r.device.includes('電腦')) devIcon = 'fa-laptop';
                if(r.device.includes('手錶')) devIcon = 'fa-stopwatch';

                // Initial Calc
                const stats = calculateLiveStats(r);
                const displayPct = stats.estPct.toFixed(1);
                
                // Color coding
                let barColor = 'bg-green-500';
                if(stats.estPct < 20) barColor = 'bg-red-500';
                else if(stats.estPct < 50) barColor = 'bg-orange-500';

                return `
                <div class="bg-gray-800/80 rounded-xl p-4 active-rental-card relative overflow-hidden group">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-3 relative z-10">
                            <div class="w-10 h-10 rounded-full bg-mi/20 text-mi flex items-center justify-center text-lg shrink-0">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <div>
                                <div class="text-white font-bold leading-tight flex items-center gap-2">
                                    ${r.user} 
                                    <span class="text-[9px] bg-gray-700 px-1.5 py-0.5 rounded text-gray-300 font-normal"><i class="fa-solid ${devIcon} mr-1"></i>${r.device}</span>
                                </div>
                                <div class="text-[10px] text-gray-400 mt-1">
                                    ${timeOnly} 借出 (${r.startPct}%)
                                </div>
                            </div>
                        </div>
                        <div class="relative z-10 text-right">
                            <div class="text-[10px] text-gray-400 mb-0.5">預估剩餘</div>
                            <div class="text-2xl font-black text-white font-mono" id="live-pct-${r.id}">${displayPct}%</div>
                        </div>
                    </div>
                    
                    <div class="w-full bg-gray-900 h-2 rounded-full overflow-hidden relative z-10 mb-3 border border-gray-700">
                        <div id="live-bar-${r.id}" class="h-full ${barColor} bat-progress" style="width: ${stats.estPct}%"></div>
                    </div>

                    <div class="flex justify-between items-center relative z-10">
                        <button onclick="window.deleteActiveRental('${r.id}')" class="text-gray-500 hover:text-red-400 transition-colors p-2 -ml-2" title="取消借出">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                        <button onclick="window.openReturnModal('${r.id}')" class="bg-white hover:bg-gray-200 text-black px-5 py-2 rounded-lg font-bold text-sm shadow-lg transition-transform active:scale-95">
                            歸還結算
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function startLiveTracking() {
            if(liveTrackerInterval) clearInterval(liveTrackerInterval);
            
            if(activeRentals.length === 0) return;

            liveTrackerInterval = setInterval(() => {
                activeRentals.forEach(r => {
                    const stats = calculateLiveStats(r);
                    const pctEl = document.getElementById(`live-pct-${r.id}`);
                    const barEl = document.getElementById(`live-bar-${r.id}`);
                    
                    if(pctEl && barEl) {
                        pctEl.innerText = stats.estPct.toFixed(1) + '%';
                        barEl.style.width = stats.estPct + '%';
                        
                        // Update color dynamically
                        if(stats.estPct < 20) barEl.className = 'h-full bg-red-500 bat-progress';
                        else if(stats.estPct < 50) barEl.className = 'h-full bg-orange-500 bat-progress';
                        else barEl.className = 'h-full bg-green-500 bat-progress';
                    }
                });
            }, 10000); // Update every 10 seconds for smooth but not heavy load
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            if(rentalHistory.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-gray-600 border border-dashed border-gray-800 rounded-xl text-sm">暫無歷史紀錄</div>`;
                return;
            }

            container.innerHTML = rentalHistory.map(h => {
                if(h.type === 'charge') {
                    return `
                    <div class="glass-panel p-3 rounded-xl border-l-4 border-l-green-500 flex justify-between items-center group mb-2">
                        <div>
                            <span class="text-[10px] font-bold text-green-500 bg-green-500/10 px-1.5 py-0.5 rounded">⚡ 充滿</span>
                            <div class="text-[10px] text-gray-500 mt-1">${formatDateTime(h.endTime)}</div>
                        </div>
                        <button onclick="window.deleteHistory('${h.id}')" class="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-400 p-1"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
                }

                return `
                <div class="glass-panel p-3 rounded-xl border-l-4 border-l-gray-500 flex justify-between group mb-2 flex-col relative">
                    <div class="absolute top-2 right-2">
                        <button onclick="window.deleteHistory('${h.id}')" class="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-400 p-1"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <div class="flex items-center justify-between mb-1 pr-6">
                        <span class="text-white font-bold text-sm">${h.user} <span class="text-[9px] text-gray-500 font-normal ml-1">${h.device}</span></span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm font-black text-white">${h.startPct}% <i class="fa-solid fa-arrow-right text-[10px] text-gray-600 mx-1"></i> ${h.endPct}%</span>
                        <span class="text-[10px] font-bold text-mi bg-mi/10 border border-mi/30 px-1.5 py-0.5 rounded">消耗 ${h.consumed}%</span>
                    </div>
                    <div class="text-[9px] text-gray-500 mt-1">${formatDateTime(h.startTime)}</div>
                </div>`;
            }).join('');
        }

        // --- Firebase Writes ---

        async function updateRecentUsers(newName) {
            const name = newName.trim();
            if (!name) return;
            let updatedNames = [...recentUsers];
            updatedNames = updatedNames.filter(n => n !== name);
            updatedNames.unshift(name);
            if (updatedNames.length > 8) updatedNames = updatedNames.slice(0, 8);
            await setDoc(docUsers, { names: updatedNames });
        }

        document.getElementById('lendForm').onsubmit = async function(e) {
            e.preventDefault();
            if(!currentUser) return;
            
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';

            try {
                const user = document.getElementById('lendUser').value;
                const cable = document.getElementById('lendCable').value;
                const device = document.getElementById('lendDevice').value;
                const startPct = parseInt(document.getElementById('lendPct').value);
                const time = document.getElementById('lendTime').value;
                
                const today = new Date();
                const dateStr = today.toISOString().split('T')[0];
                const fullDateStr = `${dateStr}T${time}:00`;

                await addDoc(colActive, {
                    user: user,
                    cable: cable,
                    device: device,
                    startPct: startPct,
                    startTime: fullDateStr,
                    timestamp: Date.now()
                });

                await setDoc(docBattery, { value: startPct });
                await updateRecentUsers(user);

                document.getElementById('lendUser').value = '';
            } catch (err) {
                console.error(err);
                alert("儲存失敗！");
            } finally {
                btn.innerHTML = '確認借出';
            }
        };

        window.openReturnModal = function(id) {
            const rental = activeRentals.find(r => r.id === id);
            if(!rental) return;

            // Calculate live estimate for pre-filling
            const stats = calculateLiveStats(rental);
            const estPct = Math.round(stats.estPct);

            document.getElementById('returnId').value = rental.id;
            document.getElementById('returnStartPct').value = rental.startPct;
            document.getElementById('returnStartTime').value = rental.startTime;
            
            document.getElementById('return-modal-user').innerText = `正在歸還: ${rental.user}`;
            document.getElementById('return-modal-est').innerText = estPct + '%';
            
            document.getElementById('returnPct').value = estPct; // Pre-fill with estimate!

            document.getElementById('returnModal').classList.remove('hidden');
        };

        document.getElementById('returnForm').onsubmit = async function(e) {
            e.preventDefault();
            if(!currentUser) return;

            const startPct = parseInt(document.getElementById('returnStartPct').value);
            const endPct = parseInt(document.getElementById('returnPct').value);
            
            if(endPct > startPct) {
                alert('歸還電量唔可以大過借出電量喎！');
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 處理中...';

            try {
                const id = document.getElementById('returnId').value;
                const startTimeStr = document.getElementById('returnStartTime').value;
                const fullEndDateStr = new Date().toISOString(); // Real time of return
                
                await addDoc(colHistory, {
                    type: 'use',
                    user: document.getElementById('return-modal-user').innerText.replace('正在歸還: ', ''),
                    device: activeRentals.find(r => r.id === id)?.device || '未知',
                    startPct: startPct,
                    endPct: endPct,
                    startTime: startTimeStr,
                    endTime: fullEndDateStr,
                    consumed: startPct - endPct,
                    timestamp: Date.now()
                });

                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'activeRentals', id));
                await setDoc(docBattery, { value: endPct });

                window.closeReturnModal();
            } catch (err) {
                console.error(err);
            } finally {
                btn.innerHTML = '確認歸還';
            }
        };

        window.addChargeRecord = function() {
            window.showConfirm('記錄充電', '確定已充滿至 100%？', async () => {
                if(!currentUser) return;
                await addDoc(colHistory, { type: 'charge', endTime: new Date().toISOString(), timestamp: Date.now() });
                await setDoc(docBattery, { value: 100 });
            });
        };

        window.deleteHistory = function(id) {
            window.showConfirm('刪除紀錄', '確定要刪除這條紀錄嗎？', async () => {
                if(!currentUser) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rentalHistory', id));
            });
        };

        window.deleteActiveRental = function(id) {
            window.showConfirm('取消借出', '確定要刪除這筆「借出中」的紀錄嗎？', async () => {
                if(!currentUser) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'activeRentals', id));
            });
        };

        document.getElementById('editBatteryForm').onsubmit = async function(e) {
            e.preventDefault();
            if(!currentUser) return;
            const newVal = parseInt(document.getElementById('newBatteryPct').value);
            if(newVal >= 0 && newVal <= 100) {
                await setDoc(docBattery, { value: newVal });
                window.closeEditBatteryModal();
            }
        };

        // --- UI Modal Controls ---
        window.closeReturnModal = () => document.getElementById('returnModal').classList.add('hidden');
        window.openEditBatteryModal = () => {
            document.getElementById('newBatteryPct').value = currentBattery;
            document.getElementById('editBatteryModal').classList.remove('hidden');
        };
        window.closeEditBatteryModal = () => document.getElementById('editBatteryModal').classList.add('hidden');

        let confirmCallback = null;
        window.showConfirm = (title, msg, callback) => {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-msg').innerText = msg;
            confirmCallback = callback;
            document.getElementById('confirmModal').classList.remove('hidden');
        };
        window.closeConfirmModal = () => document.getElementById('confirmModal').classList.add('hidden');
        document.getElementById('confirm-btn-ok').onclick = function() {
            if(confirmCallback) confirmCallback();
            window.closeConfirmModal();
        };

        // Dropdowns
        const cableOptions = [
            { icon: 'fa-bolt', text: 'C to C (快充)' },
            { icon: 'fa-plug', text: 'C to Lightning' },
            { icon: 'fa-plug', text: 'A to Lightning' },
            { icon: 'fa-usb', text: 'A to C' },
            { icon: 'fa-network-wired', text: '多合一線' }
        ];

        const deviceOptions = [
            { icon: 'fa-laptop', text: '手提電腦' },
            { icon: 'fa-tablet-screen-button', text: '平板 (iPad)' },
            { icon: 'fa-tablet-screen-button', text: '平板 (Android)' },
            { icon: 'fa-mobile-screen', text: '手機 (iPhone)' },
            { icon: 'fa-mobile-screen', text: '手機 (Android)' },
            { icon: 'fa-stopwatch', text: '手錶/耳機' },
            { icon: 'fa-layer-group', text: '多部裝置' }
        ];

        window.openSelectModal = function(title, options, currentVal, callbackName) {
            document.getElementById('select-title').innerText = title;
            const container = document.getElementById('select-options');
            
            container.innerHTML = options.map(opt => `
                <button type="button" onclick="window.handleSelect('${opt.text}', '${callbackName}')" class="w-full text-left px-4 py-3 rounded-xl mb-1 flex items-center gap-3 transition-colors ${currentVal === opt.text ? 'bg-mi/20 text-mi font-bold border border-mi/30' : 'text-gray-300 hover:bg-gray-800 border border-transparent'}">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center ${currentVal === opt.text ? 'bg-mi/20 text-mi' : 'bg-gray-800 text-gray-400'} shrink-0">
                        <i class="fa-solid ${opt.icon}"></i>
                    </div>
                    <span>${opt.text}</span>
                </button>
            `).join('');

            const modal = document.getElementById('selectModal');
            const content = document.getElementById('selectModalContent');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('translate-y-full');
            }, 10);
        };

        window.closeSelectModal = function() {
            const modal = document.getElementById('selectModal');
            const content = document.getElementById('selectModalContent');
            modal.classList.add('opacity-0');
            content.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        window.handleSelect = function(value, callbackName) {
            if(callbackName === 'setCable') window.setCableSelect(value);
            if(callbackName === 'setDevice') window.setDeviceSelect(value);
            window.closeSelectModal();
        };

        window.openCableSelect = () => window.openSelectModal('選擇線材類型', cableOptions, document.getElementById('lendCable').value, 'setCable');
        window.openDeviceSelect = () => window.openSelectModal('選擇充電裝置', deviceOptions, document.getElementById('lendDevice').value, 'setDevice');

        window.setCableSelect = (val) => {
            document.getElementById('lendCable').value = val;
            document.getElementById('btnLendCable').querySelector('span').innerText = val;
        };
        window.setDeviceSelect = (val) => {
            document.getElementById('lendDevice').value = val;
            document.getElementById('btnLendDevice').querySelector('span').innerText = val;
        };

        function formatTimeOnly(isoString) {
            try { return isoString.split('T')[1].substring(0, 5); } catch(e) { return '--:--'; }
        }
        function formatDateTime(isoString) {
            try { 
                const d = new Date(isoString);
                return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            } catch(e) { return isoString; }
        }
    </script>
</body>
</html>
